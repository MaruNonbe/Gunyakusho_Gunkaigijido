<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR 復元版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }

        /* UIデザイン */
        .menu { position: absolute; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; font-size: 13px; }
        .active-btn { background: #4CAF50 !important; color: white; }

        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 40%; left: 10px; }
        .ctrl-right { top: 40%; right: 10px; }
        .bottom-bar { position: absolute; bottom: 25px; width: 100%; display: flex; justify-content: center; gap: 12px; }
        
        /* ログ表示エリア（トラブル解析用） */
        #log-console { 
            position: absolute; top: 10px; right: 10px; width: 200px; height: 100px; 
            background: rgba(0,0,0,0.7); color: #0f0; font-size: 10px; padding: 5px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-console">システム起動中...</div>

        <div class="menu top-left clickable">
            <button id="btn-all" class="active-btn" onclick="switchModel('all')">全体表示</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館</button>
            <button id="btn-assembly1" onclick="switchModel('assembly1')">初代</button>
            <button id="btn-assembly2" onclick="switchModel('assembly2')">二代目</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="moveModel('z', -1)">前へ</button>
            <button onclick="moveModel('z', 1)">後へ</button>
            <button onclick="moveModel('y', 0.5)">上へ</button>
            <button onclick="moveModel('y', -0.5)">下へ</button>
        </div>

        <div class="menu ctrl-right clickable">
            <button onclick="rotateModel(20)">右回転</button>
            <button onclick="rotateModel(-20)">左回転</button>
            <button onclick="scaleModel(1.2)">拡大</button>
            <button onclick="scaleModel(0.8)">縮小</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#ff4b4b; color:white;">🔄 再起動</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" renderer="logarithmicDepthBuffer: true;">
        <a-assets>
            <img id="shadow-img" src="https://raw.githubusercontent.com/n5ro/aframe-extras/master/assets/shadow.png">
        </a-assets>

        <a-entity id="ar-anchor" position="0 -1.6 -5">
            <a-entity id="main-model" gltf-model="Buildings-v3.glb"></a-entity>
            <a-image id="shadow" src="#shadow-img" rotation="-90 0 0" scale="6 6 6" position="0 0.01 0" opacity="0.5"></a-image>
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // ログ出力関数
        function writeLog(msg) {
            const logEl = document.getElementById('log-console');
            logEl.innerHTML += "<br>> " + msg;
            logEl.scrollTop = logEl.scrollHeight;
            console.log(msg);
        }

        const appData = {
            all: "Buildings-v3.glb",
            kozakura: "Buildings-Gunyakusho.glb",
            assembly1: "Buildings-1st_Gunkai.glb",
            assembly2: "Buildings-2nd_Gunkai.glb"
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        // 建物切り替え
        function switchModel(key) {
            const fileName = appData[key];
            writeLog("読込開始: " + fileName);
            
            model.setAttribute('gltf-model', fileName);
            
            // UI更新
            document.querySelectorAll('.top-left button').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + key).classList.add('active-btn');
        }

        // 調整関数
        function moveModel(axis, val) { 
            let p = anchor.getAttribute('position'); 
            p[axis] += val; 
            anchor.setAttribute('position', p); 
            writeLog("位置変更: " + axis + "=" + p[axis].toFixed(1));
        }
        function rotateModel(deg) { 
            let r = anchor.getAttribute('rotation'); 
            r.y += deg; 
            anchor.setAttribute('rotation', r); 
            writeLog("回転: " + r.y + "度");
        }
        function scaleModel(f) { 
            let s = anchor.getAttribute('scale'); 
            s.x *= f; s.y *= f; s.z *= f; 
            anchor.setAttribute('scale', s); 
            writeLog("倍率: " + s.x.toFixed(2));
        }

        // エラー検知
        model.addEventListener('model-error', (e) => {
            writeLog("エラー: ファイルが見つかりません");
        });
        model.addEventListener('model-loaded', () => {
            writeLog("読込成功！");
        });
    </script>
</body>
