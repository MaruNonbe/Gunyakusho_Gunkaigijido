<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 5px; }
        button { padding: 10px; border-radius: 8px; border: none; background: white; font-weight: bold; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 40%; left: 10px; }
        .ctrl-right { top: 40%; right: 10px; }
        .bottom { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        .active { background: #4CAF50; color: white; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="menu top-left clickable">
            <button id="btn-all" class="active" onclick="switchModel('all')">全体</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館</button>
            <button id="btn-assembly1" onclick="switchModel('assembly1')">初代</button>
            <button id="btn-assembly2" onclick="switchModel('assembly2')">二代目</button>
        </div>
        <div class="menu ctrl-left clickable">
            <button onclick="move('z', -1)">前へ</button>
            <button onclick="move('z', 1)">後へ</button>
            <button onclick="move('y', 0.5)">上へ</button>
            <button onclick="move('y', -0.5)">下へ</button>
        </div>
        <div class="menu ctrl-right clickable">
            <button onclick="rotate(20)">右回転</button>
            <button onclick="rotate(-20)">左回転</button>
            <button onclick="scale(1.2)">拡大</button>
            <button onclick="scale(0.8)">縮小</button>
        </div>
        <div class="bottom clickable">
            <button onclick="location.reload()">🔄 再読込</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="anchor" position="0 -1.6 -5">
            <a-entity id="model" gltf-model="Buildings-v3.glb"></a-entity>
        </a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const appData = {
            all: "Buildings-v3.glb",
            kozakura: "Buildings-Gunyakusho.glb",
            assembly1: "Buildings-1st_Gunkai.glb",
            assembly2: "Buildings-2nd_Gunkai.glb"
        };

        const anchor = document.getElementById('anchor');
        const model = document.getElementById('model');

        function switchModel(key) {
            const fileName = appData[key];
            model.setAttribute('gltf-model', fileName);
            
            // 2代目の時だけ、もし見えなくても強制的に目の前に置く設定
            if(key === 'assembly2') {
                anchor.setAttribute('position', '0 0 -3');
            } else {
                anchor.setAttribute('position', '0 -1.6 -5');
            }

            document.querySelectorAll('.top-left button').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + key).classList.add('active');
        }

        function move(ax, v) { let p = anchor.getAttribute('position'); p[ax] += v; anchor.setAttribute('position', p); }
        function rotate(d) { let r = anchor.getAttribute('rotation'); r.y += d; anchor.setAttribute('rotation', r); }
        function scale(f) { let s = anchor.getAttribute('scale'); s.x *= f; s.y *= f; s.z *= f; anchor.setAttribute('scale', s); }
    </script>
</body>
</html>
