<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 ARポータル</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .clickable { pointer-events: auto; }

        /* 上部メニュー：建物切り替え */
        .top-menu { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; }
        .top-menu button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2); font-size: 14px; }
        .active-btn { background: #4CAF50 !important; color: white; }

        /* 言語選択 */
        .lang-menu { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .lang-menu button { padding: 8px 12px; border-radius: 5px; border: none; background: white; font-size: 12px; font-weight: bold; }

        /* 下部アクションバー */
        .bottom-bar { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .btn-action { width: 60px; height: 60px; border-radius: 50%; border: none; background: white; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); cursor: pointer; }
        .recording { background: #ff4b4b !important; color: white; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* 説明パネル */
        #desc-panel { position: absolute; bottom: 0; width: 100%; height: 38%; background: rgba(0,0,0,0.85); color: white; border-radius: 20px 20px 0 0; display: none; padding: 20px; box-sizing: border-box; transition: 0.3s; }
        .scroll-box { overflow-y: auto; height: 75%; margin-top: 10px; line-height: 1.6; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="top-menu clickable">
            <button id="btn-all" class="active-btn" onclick="switchModel('all')">全体表示</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館</button>
            <button id="btn-assembly1" onclick="switchModel('assembly1')">初代議事堂</button>
            <button id="btn-assembly2" onclick="switchModel('assembly2')">二代目議事堂</button>
        </div>

        <div class="lang-menu clickable">
            <button onclick="changeLang('jp')">JP</button>
            <button onclick="changeLang('en')">EN</button>
        </div>

        <div class="bottom-bar clickable">
            <button class="btn-action" onclick="takePhoto()">📸</button>
            <button id="rec-btn" class="btn-action" onclick="toggleRecording()">⏺️</button>
            <button class="btn-action" onclick="shareApp()">🔗</button>
            <button class="btn-action" onclick="playAudio()">🔊</button>
            <button class="btn-action" onclick="toggleInfo()">ℹ️</button>
        </div>

        <div id="desc-panel" class="clickable">
            <button style="float:right; background:none; border:none; color:white; font-size:24px;" onclick="toggleInfo()">×</button>
            <h2 id="info-title" style="margin:0;">建物情報</h2>
            <div class="scroll-box"><p id="info-text">建物名を選択してください。</p></div>
        </div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="antialias: false; precision: mediump; logarithmicDepthBuffer: true;"
        gesture-detector
        webxr="enabled: false;"
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    >
        <a-assets>
            <img id="shadow-img" src="https://raw.githubusercontent.com/n5ro/aframe-extras/master/assets/shadow.png">
        </a-assets>

        <a-entity id="ar-anchor" position="0 -1.5 -5" raycaster="objects: .clickable" gesture-handler>
            <a-entity 
                id="main-model" 
                gltf-model="Buildings-v3.glb" 
                scale="1 1 1"
                class="clickable">
            </a-entity>
            
            <a-image src="#shadow-img" rotation="-90 0 0" scale="4 4 4" position="0 0.01 0" opacity="0.6"></a-image>
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // --- データ定義 ---
        const appData = {
            all: { model: "Buildings-v3.glb", jp: { title: "文教の森 全体像", text: "明治時代の郡役所と議事堂の配置を再現しています。", audio: "" } },
            kozakura: { model: "Buildings-Gunyakusho.glb", jp: { title: "旧西置賜郡役所（小桜館）", text: "1878年に建てられた山形県内最古の郡役所建築です。", audio: "Kozakura_JP.mp3" }, en: { title: "Former District Office", text: "Built in 1878...", audio: "Kozakura_EN.mp3" } },
            assembly1: { model: "Buildings-1st_Gunkai.glb", jp: { title: "初代西置賜郡会議事堂", text: "明治20年に建てられた洋風木造建築です。", audio: "1st_Gunkai_JP.mp3" } },
            assembly2: { model: "Buildings-2nd_Gunkai.glb", jp: { title: "二代目西置賜郡会議事堂", text: "明治44年に新築された議事堂です。", audio: "2nd_Gunkai_JP.mp3" } }
        };

        let currentMode = "all";
        let currentLang = "jp";
        let audioPlayer = new Audio();
        let isRecording = false;
        let mediaRecorder;
        let recordedChunks = [];

        // --- 機能関数 ---
        function switchModel(key) {
            currentMode = key;
            const data = appData[key];
            document.getElementById('main-model').setAttribute('gltf-model', data.model);
            
            // UI更新
            document.querySelectorAll('.top-menu button').forEach(btn => btn.classList.remove('active-btn'));
            const btnId = key === 'all' ? 'btn-all' : 'btn-' + key;
            const targetBtn = document.getElementById(btnId);
            if(targetBtn) targetBtn.classList.add('active-btn');

            updateUIContent();
        }

        function updateUIContent() {
            const content = appData[currentMode][currentLang] || appData[currentMode]['jp'];
            document.getElementById('info-title').innerText = content.title;
            document.getElementById('info-text').innerText = content.text;
            audioPlayer.pause();
            if (content.audio) audioPlayer.src = "audio/" + content.audio;
        }

        function changeLang(lang) {
            currentLang = lang;
            updateUIContent();
        }

        function playAudio() {
            audioPlayer.play().catch(e => alert("スピーカーボタンを押して音声を再生してください"));
        }

        function toggleInfo() {
            const p = document.getElementById('desc-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        // 写真撮影
        function takePhoto() {
            const scene = document.querySelector('a-scene');
            const canvas = scene.components.screenshot.getCanvas('perspective');
            const link = document.createElement('a');
            link.download = `nagai_ar_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        // 録画機能
        async function toggleRecording() {
            const btn = document.getElementById('rec-btn');
            if (!isRecording) {
                const canvas = document.querySelector('canvas');
                const stream = canvas.captureStream(30);
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });
                mediaRecorder.ondataavailable = e => recordedChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(recordedChunks, { type: 'video/webm' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url; a.download = 'nagai_ar_video.webm'; a.click();
                    recordedChunks = [];
                };
                mediaRecorder.start();
                btn.classList.add('recording');
                isRecording = true;
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                isRecording = false;
            }
        }

        // SNS共有 (Web Share API)
        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: '文教の森 ARポータル',
                    text: '長井市の歴史的建造物をARで体験中！ #長井市 #文教の森 #WebAR',
                    url: location.href
                });
            } else {
                prompt("URLをコピーしてSNSで共有してください：", location.href);
            }
        }
    </script>
</body>
</html>
