<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 ARポータル</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }

        /* UIのデザインは維持 */
        .top-menu { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; }
        .top-menu button { padding: 12px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; font-size: 14px; }
        .active-btn { background: #4CAF50 !important; color: white; }
        .lang-menu { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .lang-menu button { padding: 8px 10px; border-radius: 5px; border: none; background: white; font-size: 11px; font-weight: bold; }
        .bottom-bar { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .btn-action { width: 55px; height: 55px; border-radius: 50%; border: none; background: white; font-size: 22px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #desc-panel { position: absolute; bottom: 0; width: 100%; height: 38%; background: rgba(0,0,0,0.85); color: white; border-radius: 20px 20px 0 0; display: none; padding: 20px; box-sizing: border-box; }
        .scroll-box { overflow-y: auto; height: 75%; margin-top: 10px; line-height: 1.6; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="top-menu clickable">
            <button id="btn-all" class="active-btn" onclick="switchModel('all')">全体表示</button>
            <button id="btn-kozakura" onclick="switchModel('kozakura')">小桜館</button>
            <button id="btn-assembly1" onclick="switchModel('assembly1')">初代議事堂</button>
            <button id="btn-assembly2" onclick="switchModel('assembly2')">二代目議事堂</button>
        </div>

        <div class="lang-menu clickable">
            <button onclick="changeLang('jp')">JP</button>
            <button onclick="changeLang('en')">EN</button>
            <button onclick="changeLang('ko')">KO</button>
            <button onclick="changeLang('zh')">CN</button>
        </div>

        <div class="bottom-bar clickable">
            <button class="btn-action" onclick="takePhoto()">📸</button>
            <button class="btn-action" onclick="shareApp()">🔗</button>
            <button class="btn-action" onclick="playAudio()">🔊</button>
            <button class="btn-action" onclick="toggleInfo()">ℹ️</button>
        </div>

        <div id="desc-panel" class="clickable">
            <button style="float:right; background:none; border:none; color:white; font-size:24px;" onclick="toggleInfo()">×</button>
            <h2 id="info-title" style="margin:0;">建物情報</h2>
            <div class="scroll-box"><p id="info-text">建物名を選択してください。</p></div>
        </div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="antialias: false; precision: mediump; logarithmicDepthBuffer: true;"
        gesture-detector
        id="scene"
        webxr="enabled: false;"
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    >
        <a-assets>
            <img id="shadow-img" src="https://raw.githubusercontent.com/n5ro/aframe-extras/master/assets/shadow.png">
        </a-assets>

        <a-entity 
            id="ar-anchor" 
            position="0 -1.5 -5" 
            class="clickable"
            gesture-handler="minScale: 0.1; maxScale: 10"
        >
            <a-entity 
                id="main-model" 
                gltf-model="Buildings-v3.glb" 
                scale="1 1 1">
            </a-entity>
            <a-image src="#shadow-img" rotation="-90 0 0" scale="4 4 4" position="0 0.01 0" opacity="0.6"></a-image>
        </a-entity>

        <a-camera gps-camera rotation-reader raycaster="objects: .clickable" cursor="fuse: false; rayOrigin: mouse;"></a-camera>
    </a-scene>

    <script>
        // --- 4ヶ国語対応データ構造 ---
        const appData = {
            all: { 
                model: "Buildings-v3.glb", 
                jp: { title: "文教の森 全体像", text: "明治時代の配置を再現しています。", audio: "" },
                en: { title: "Full View", text: "Reconstructing the original layout.", audio: "" },
                ko: { title: "전체 모습", text: "메이지 시대의 배치를 재현하고 있습니다.", audio: "" },
                zh: { title: "文教之森 全景", text: "重现了明治时代的布局。", audio: "" }
            },
            kozakura: { 
                model: "Buildings-Gunyakusho.glb", 
                jp: { title: "旧西置賜郡役所（小桜館）", text: "1878年に建てられた擬洋風建築です。", audio: "Kozakura_JP.mp3" },
                en: { title: "Former District Office", text: "Built in 1878, a Western-style building.", audio: "Kozakura_EN.mp3" },
                ko: { title: "구 니시오키타마군 역소", text: "1878년에 지어진 의양풍 건축입니다.", audio: "Kozakura_KO.mp3" },
                zh: { title: "旧西置赐郡公署", text: "建于1878年的拟洋风建筑。", audio: "Kozakura_CN.mp3" }
            },
            assembly1: { 
                model: "Buildings-1st_Gunkai.glb", 
                jp: { title: "初代西置賜郡会議事堂", text: "明治20年に建てられた洋風木造建築です。", audio: "1st_JP.mp3" },
                en: { title: "1st Assembly Hall", text: "Built in 1887, a wooden hall.", audio: "1st_EN.mp3" },
                ko: { title: "초대 군 회의사당", text: "1887년에 세워진 서양식 목조 건물입니다.", audio: "1st_KO.mp3" },
                zh: { title: "第一代郡会议事堂", text: "建于1887年的西式木造建筑。", audio: "1st_CN.mp3" }
            },
            assembly2: { 
                model: "Buildings-2nd_Gunkai.glb", 
                jp: { title: "二代目西置賜郡会議事堂", text: "明治44年に新築された議事堂です。", audio: "2nd_JP.mp3" },
                en: { title: "2nd Assembly Hall", text: "Newly built in 1911.", audio: "2nd_EN.mp3" },
                ko: { title: "2대 군 회의사당", text: "1911년에 새로 지어진 사당입니다.", audio: "2nd_KO.mp3" },
                zh: { title: "第二代郡会议事堂", text: "1911年新建的议事堂。", audio: "2nd_CN.mp3" }
            }
        };

        let currentMode = "all";
        let currentLang = "jp";
        let audioPlayer = new Audio();

        function switchModel(key) {
            currentMode = key;
            const data = appData[key];
            document.getElementById('main-model').setAttribute('gltf-model', data.model);
            
            document.querySelectorAll('.top-menu button').forEach(btn => btn.classList.remove('active-btn'));
            const targetBtn = document.getElementById(key === 'all' ? 'btn-all' : 'btn-' + key);
            if(targetBtn) targetBtn.classList.add('active-btn');

            updateUIContent();
        }

        function updateUIContent() {
            const content = appData[currentMode][currentLang] || appData[currentMode]['jp'];
            document.getElementById('info-title').innerText = content.title;
            document.getElementById('info-text').innerText = content.text;
            audioPlayer.pause();
            if (content.audio) audioPlayer.src = "audio/" + content.audio;
        }

        function changeLang(lang) {
            currentLang = lang;
            updateUIContent();
        }

        function playAudio() {
            if (audioPlayer.src) audioPlayer.play().catch(e => console.log("再生エラー"));
        }

        function toggleInfo() {
            const p = document.getElementById('desc-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }

        function takePhoto() {
            const scene = document.querySelector('a-scene');
            const canvas = scene.components.screenshot.getCanvas('perspective');
            const link = document.createElement('a');
            link.download = `nagai_ar_${Date.now()}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: '文教の森 AR', url: location.href });
            } else {
                prompt("URLをコピーしてください：", location.href);
            }
        }
    </script>
</body>
</html>
