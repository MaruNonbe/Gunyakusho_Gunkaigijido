<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 ARポータル</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://raw.githack.com/fcor/arjs-gestures/master/dist/gestures.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .clickable { pointer-events: auto; }
        /* UIデザイン（前回同様） */
        .top-menu { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; }
        .top-menu button { padding: 10px; border-radius: 8px; border: none; background: rgba(255,255,255,0.9); font-weight: bold; cursor: pointer; }
        .bottom-bar { position: absolute; bottom: 30px; width: 100%; display: flex; justify-content: center; gap: 15px; }
        .btn-action { width: 55px; height: 55px; border-radius: 50%; border: none; background: white; font-size: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #desc-panel { position: absolute; bottom: 0; width: 100%; height: 35%; background: rgba(0,0,0,0.85); color: white; border-radius: 20px 20px 0 0; display: none; padding: 20px; box-sizing: border-box; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="top-menu clickable">
            <button onclick="switchModel('all')">全体表示</button>
            <button onclick="switchModel('kozakura')">小桜館</button>
        </div>
        <div class="bottom-bar clickable">
            <button class="btn-action" onclick="takePhoto()">📸</button>
            <button id="rec-btn" class="btn-action" onclick="toggleRecording()">⏺️</button>
            <button class="btn-action" onclick="shareApp()">🔗</button>
            <button class="btn-action" onclick="toggleInfo()">ℹ️</button>
        </div>
        <div id="desc-panel" class="clickable">
            <h2 id="info-title">建物情報</h2>
            <p id="info-text">ここに説明が表示されます。</p>
        </div>
    </div>

    <a-scene
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="antialias: false; precision: mediump; logarithmicDepthBuffer: true;"
        gesture-detector
        gltf-model="dracoDecoderPath: https://www.gstatic.com/draco/versioned/decoders/1.5.6/;"
    >
        <a-assets>
            <a-asset-item id="full-model" src="Buildings-v3.glb"></a-asset-item>
            <img id="shadow-img" src="https://raw.githubusercontent.com/n5ro/aframe-extras/master/assets/shadow.png">
        </a-assets>

        <a-entity id="ar-anchor" position="0 -1.5 -5" gesture-handler>
            <a-entity id="main-model" gltf-model="#full-model" scale="1 1 1"></a-entity>
            
            <a-image src="#shadow-img" rotation="-90 0 0" scale="3 3 3" position="0 0.01 0" opacity="0.6"></a-image>
        </a-entity>

        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        // 前回のスクリプト（録画、共有、情報表示）をここに統合
        function toggleInfo() {
            const p = document.getElementById('desc-panel');
            p.style.display = p.style.display === 'none' ? 'block' : 'none';
        }
        
        function takePhoto() {
            const scene = document.querySelector('a-scene');
            const canvas = scene.components.screenshot.getCanvas('perspective');
            const link = document.createElement('a');
            link.download = "nagai_ar.png";
            link.href = canvas.toDataURL();
            link.click();
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({ title: '文教の森 AR', url: location.href });
            }
        }
        
        // 録画ロジック（中略：前回提示分を流用可能）
    </script>
</body>
</html>
