<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 GPS-AR</title>

    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: sans-serif;
            background: #000;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
        }

        .clickable {
            pointer-events: auto;
        }

        .building-menu {
            position: absolute;
            top: 10px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .building-menu button,
        .mode-menu button,
        .lang-menu button {
            padding: 8px 10px;
            border-radius: 6px;
            border: none;
            background: rgba(255,255,255,0.88);
            cursor: pointer;
            font-size: 13px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.25);
        }

        .mode-menu {
            position: absolute;
            top: 130px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .lang-menu {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 5px;
        }

        .bottom-bar {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            background: white;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
        }

        #desc-panel {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 40%;
            background: rgba(0, 0, 0, 0.72);
            color: white;
            border-radius: 20px 20px 0 0;
            display: none;
            padding: 20px;
            box-sizing: border-box;
        }

        .scroll-box {
            overflow-y: auto;
            height: 80%;
            margin-top: 10px;
            line-height: 1.6;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 20px;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }

        #status-box {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.55);
            color: #fff;
            padding: 8px 14px;
            border-radius: 999px;
            font-size: 12px;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div class="building-menu clickable">
            <button onclick="setBuilding('kozakukan')">小桜館</button>
            <button onclick="setBuilding('firstAssemblyHall')">初代会議事堂</button>
            <button onclick="setBuilding('secondAssemblyHall')">二代目会議事堂</button>
        </div>

        <div class="mode-menu clickable">
            <button onclick="setDisplayMode('gps')">GPS表示</button>
            <button onclick="setDisplayMode('free')">自由表示</button>
        </div>

        <div class="lang-menu clickable">
            <button onclick="updateContent('jp')">JP</button>
            <button onclick="updateContent('en')">EN</button>
            <button onclick="updateContent('ko')">KO</button>
            <button onclick="updateContent('zh')">CN</button>
        </div>

        <div id="status-box">GPS表示</div>

        <div class="bottom-bar clickable">
            <button class="btn-circle" onclick="takeSnapshot()" type="button">📸</button>
            <button class="btn-circle" onclick="toggleInfo()" type="button">ℹ️</button>
            <button class="btn-circle" onclick="playCurrentAudio()" type="button">🔊</button>
            <a href="tel:0238885151"><button class="btn-circle" type="button">📞</button></a>
            <a href="mailto:bunkyonomori@city.nagai.yamagata.jp"><button class="btn-circle" type="button">✉️</button></a>
        </div>

        <div id="desc-panel" class="clickable">
            <button class="close-btn" onclick="toggleInfo()" type="button">×</button>
            <h2 id="panel-title">旧西置賜郡役所</h2>
            <div class="scroll-box">
                <p id="panel-text">ここに各言語の説明文が表示されます。</p>
            </div>
        </div>
    </div>

    <a-scene
        vr-mode-ui="enabled: false"
        embedded
        arjs="sourceType: webcam; debugUIEnabled: false;"
        renderer="logarithmicDepthBuffer: true;"
    >
        <a-assets>
            <a-asset-item id="building-model" src="Buildings-v3.glb"></a-asset-item>
        </a-assets>

        <!-- GPS表示用 -->
        <a-entity
            id="gps-anchor"
            gps-entity-place="latitude: 38.110949737154165; longitude: 140.03641843352221;"
            visible="true"
        >
            <a-entity
                id="gps-model"
                gltf-model="#building-model"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                visible="true"
                touch-transform
            ></a-entity>
        </a-entity>

        <!-- 自由表示用 -->
        <a-entity id="free-anchor" visible="false">
            <a-entity
                id="free-model"
                gltf-model="#building-model"
                position="0 0 0"
                rotation="0 0 0"
                scale="1 1 1"
                visible="true"
                touch-transform
            ></a-entity>
        </a-entity>

        <a-camera id="main-camera" gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        AFRAME.registerComponent('touch-transform', {
            init: function () {
                this.isOneFinger = false;
                this.isTwoFinger = false;
                this.startX = 0;
                this.startY = 0;
                this.startPos = { x: 0, y: 0, z: 0 };
                this.startScale = { x: 1, y: 1, z: 1 };
                this.startDistance = 0;
                this.minScale = 0.2;
                this.maxScale = 8.0;
                this.moveFactor = 0.01;

                const bindCanvas = () => {
                    const canvas = this.el.sceneEl.canvas;
                    if (!canvas) return;

                    this._touchStartHandler = this.onTouchStart.bind(this);
                    this._touchMoveHandler = this.onTouchMove.bind(this);
                    this._touchEndHandler = this.onTouchEnd.bind(this);

                    canvas.addEventListener('touchstart', this._touchStartHandler, { passive: false });
                    canvas.addEventListener('touchmove', this._touchMoveHandler, { passive: false });
                    canvas.addEventListener('touchend', this._touchEndHandler, { passive: false });
                };

                if (this.el.sceneEl.canvas) {
                    bindCanvas();
                } else {
                    this.el.sceneEl.addEventListener('renderstart', bindCanvas, { once: true });
                }
            },

            distanceBetweenTouches: function (t1, t2) {
                const dx = t2.clientX - t1.clientX;
                const dy = t2.clientY - t1.clientY;
                return Math.sqrt(dx * dx + dy * dy);
            },

            isActiveTarget: function () {
                return this.el.parentEl && this.el.parentEl.getAttribute('visible') === true;
            },

            onTouchStart: function (e) {
                if (!this.isActiveTarget()) return;
                if (!e.touches || e.touches.length === 0) return;

                if (e.touches.length === 1) {
                    this.isOneFinger = true;
                    this.isTwoFinger = false;
                    this.startX = e.touches[0].clientX;
                    this.startY = e.touches[0].clientY;
                    this.startPos = {
                        x: this.el.object3D.position.x,
                        y: this.el.object3D.position.y,
                        z: this.el.object3D.position.z
                    };
                }

                if (e.touches.length === 2) {
                    this.isOneFinger = false;
                    this.isTwoFinger = true;
                    this.startDistance = this.distanceBetweenTouches(e.touches[0], e.touches[1]);
                    this.startScale = {
                        x: this.el.object3D.scale.x,
                        y: this.el.object3D.scale.y,
                        z: this.el.object3D.scale.z
                    };
                }
            },

            onTouchMove: function (e) {
                if (!this.isActiveTarget()) return;
                if (!e.touches || e.touches.length === 0) return;

                if (this.isOneFinger && e.touches.length === 1) {
                    e.preventDefault();
                    const dx = e.touches[0].clientX - this.startX;
                    const dy = e.touches[0].clientY - this.startY;
                    const newX = this.startPos.x + dx * this.moveFactor;
                    const newZ = this.startPos.z + dy * this.moveFactor;
                    this.el.object3D.position.set(newX, this.startPos.y, newZ);
                }

                if (this.isTwoFinger && e.touches.length === 2) {
                    e.preventDefault();
                    const currentDistance = this.distanceBetweenTouches(e.touches[0], e.touches[1]);
                    if (this.startDistance <= 0) return;
                    let ratio = currentDistance / this.startDistance;
                    let newScale = this.startScale.x * ratio;
                    newScale = Math.max(this.minScale, Math.min(this.maxScale, newScale));
                    this.el.object3D.scale.set(newScale, newScale, newScale);
                }
            },

            onTouchEnd: function (e) {
                if (!e.touches || e.touches.length === 0) {
                    this.isOneFinger = false;
                    this.isTwoFinger = false;
                    return;
                }

                if (e.touches.length === 1) {
                    this.isOneFinger = true;
                    this.isTwoFinger = false;
                    this.startX = e.touches[0].clientX;
                    this.startY = e.touches[0].clientY;
                    this.startPos = {
                        x: this.el.object3D.position.x,
                        y: this.el.object3D.position.y,
                        z: this.el.object3D.position.z
                    };
                }
            }
        });

        const LOG_ENDPOINT = "https://script.google.com/macros/s/AKfycbwgwKmn182INw30dpcm3Yaet4ZXZKyPzLpY1qOAX9kvENckPjZH4mBZg_E4aQ1w-qFg/exec";
        const HEARTBEAT_INTERVAL_MS = 20000;

        let currentDisplayMode = "gps";
        let currentBuilding = "kozakukan";
        let currentLang = "jp";
        let currentSpotId = "kozakukan";
        let currentAudio = new Audio();

        let sessionId = null;
        let userId = null;
        let enteredAt = null;
        let lastSeenAt = null;
        let heartbeatTimer = null;
        let hasEnded = false;

        const buildingTranslations = {
            kozakukan: {
                spotId: "kozakukan",
                gps: { latitude: 38.110949737154165, longitude: 140.03641843352221 },
                jp: {
                    title: "旧西置賜郡役所",
                    text: "西置賜郡役所は、明治11年に建てられた擬洋風建築です。和の木造技術で洋風の意匠を表した建物で、現存する郡役所としては全国でも古い例に数えられます。現在は「小桜館」として保存・活用されています。",
                    audio: "Kozakura_Japanese.wav"
                },
                en: {
                    title: "Former Nishi-Okitama District Office",
                    text: "The Nishiokitama District Office was built in 1878 and is a fine example of pseudo-Western architecture. It combines traditional Japanese wooden construction with Western design elements, and it is regarded as one of the oldest surviving district office buildings in Japan. Today, it is preserved and used under the name Kozakurakan.",
                    audio: "Kozakura_English.wav"
                },
                ko: {
                    title: "구 니시오키타마군 역소",
                    text: "니시오키타마 군청은 1878년에 세워진 의양풍 건축입니다. 일본 전통 목조건축 기술로 서양식 외관을 표현한 건물로, 현존하는 군청 건물 가운데서도 매우 오래된 사례로 평가됩니다. 현재는 ‘고자쿠라칸’으로 보존·활用되고 있습니다.",
                    audio: "Kozakura_Korean.wav"
                },
                zh: {
                    title: "旧西置赐郡公署",
                    text: "西置赐郡役所建于1878年，是一座典型的拟洋风建筑。它以日本传统木构技术表现西式外观，被认为是日本现存最古老的郡役所建筑之一。如今，这座建筑以“小樱馆”的名称被保存并继续利用。",
                    audio: "Kozakura_Chinese.wav"
                }
            },

            firstAssemblyHall: {
                spotId: "first_assembly_hall",
                gps: { latitude: 38.110949737154165, longitude: 140.03641843352221 },
                jp: {
                    title: "初代西置賜郡会議事堂",
                    text: "初代西置賜郡会議事堂は、明治20年に建てられた洋風木造の議事堂です。西置賜郡の議会が開かれた建物で、のちに役目を終えた後は置賜織物同業組合の事務所として使われ、地域産業の歩みも見守りました。",
                    audio: "1st_NisiokitamaGunkai_Japanese.wav"
                },
                en: {
                    title: "First Nishiokitama District Assembly Hall",
                    text: "The first Nishiokitama District Assembly Hall was a Western-style wooden hall built in 1887. It served as the meeting place for the district assembly, and after its original role ended, it was reused as the office of the Okitama Textile Trade Association, linking the building to the region’s industrial history.",
                    audio: "1st_NisiokitamaGunkai_English.wav"
                },
                ko: {
                    title: "초대 니시오키타마 군 회의사당",
                    text: "초대 니시오키타마 군 회의사당은 1887년에 세워진 서양식 목조 건물입니다. 니시오키타마 군의 의회가 열리던 장소였으며, 본래의 역할을 마친 뒤에는 오키타마 직물 동업조합 사무소로 활용되어 지역 산업의 역사와도 이어졌습니다.",
                    audio: "1st_NisiokitamaGunkai_Korean.wav"
                },
                zh: {
                    title: "第一代西置赐郡会议事堂",
                    text: "第一代西置赐郡会议事堂建于1887年，是一座西式木造建筑。这里曾是西置赐郡议会召开的场所，在完成原有使命后，又被用作置赐织物同业组合事务所，见证了当地产业的发展历程。",
                    audio: "1st_NisiokitamaGunkai_Chinese.wav"
                }
            },

            secondAssemblyHall: {
                spotId: "second_assembly_hall",
                gps: { latitude: 38.110949737154165, longitude: 140.03641843352221 },
                jp: {
                    title: "二代目西置賜郡会議事堂",
                    text: "二代目西置賜郡会議事堂は、明治44年10月に郡役所の北側へ新築された議事堂です。郡政の中心施設として使われましたが、郡制廃止後は郡教育会館や図書館として再利用され、学びと文化の場へと受け継がれました。",
                    audio: "2nd_NishiokitamaGUnkai_Japanese.wav"
                },
                en: {
                    title: "Second Nishiokitama District Assembly Hall",
                    text: "The second Nishiokitama District Assembly Hall was newly built in October 1911 on the north side of the district office. It served as a central facility for district administration. After the district system was abolished, the building was reused as an education hall and a library.",
                    audio: "2nd_NishiokitamaGUnkai_English.wav"
                },
                ko: {
                    title: "2대 니시오키타마 군 회의사당",
                    text: "2대 니시오키타마 군 회의사당은 1911년 10월, 군청 북쪽에 새로 지어진 건물입니다. 이 건물은 군 행정의 중심 시설로 사용되었습니다. 군제가 폐지된 뒤에는 교육회관과 도서관으로 다시 활용되었습니다.",
                    audio: "2nd_NishiokitamaGUnkai_Korean.wav"
                },
                zh: {
                    title: "第二代西置赐郡会议事堂",
                    text: "第二代西置赐郡会议事堂于1911年10月在郡役所北侧新建。它曾是郡政运作的重要设施。郡制废除后，这座建筑又被改作教育会馆和图书馆。",
                    audio: "2nd_NishiokitamaGUnkai_Chinese.wav"
                }
            }
        };

        function generateId(prefix = "id") {
            return prefix + "_" + Date.now() + "_" + Math.random().toString(36).slice(2, 10);
        }

        function getOrCreateUserId() {
            const key = "webar_user_id";
            let id = localStorage.getItem(key);
            if (!id) {
                id = generateId("user");
                localStorage.setItem(key, id);
            }
            return id;
        }

        function nowIso() {
            return new Date().toISOString();
        }

        function calcDurationSec(fromIso, toIso) {
            if (!fromIso || !toIso) return "";
            return Math.max(0, Math.floor((new Date(toIso) - new Date(fromIso)) / 1000));
        }

        function buildPayload(eventType, extra = {}) {
            return {
                event_type: eventType,
                session_id: sessionId,
                user_id: userId,
                spot_id: currentSpotId,
                page_url: location.href,
                lang: currentLang,
                entered_at: enteredAt,
                left_at: extra.left_at || "",
                last_seen_at: extra.last_seen_at || lastSeenAt || "",
                duration_sec: extra.duration_sec ?? "",
                visibility_state: document.visibilityState,
                user_agent: navigator.userAgent,
                note: extra.note || ""
            };
        }

        function postJson(payload) {
            if (!LOG_ENDPOINT) return Promise.resolve();

            return fetch(LOG_ENDPOINT, {
                method: "POST",
                headers: {
                    "Content-Type": "text/plain;charset=utf-8"
                },
                body: JSON.stringify(payload),
                mode: "no-cors"
            }).catch(err => {
                console.warn("log post error:", err);
            });
        }

        function sendBeaconLog(payload) {
            try {
                if (!LOG_ENDPOINT) return false;
                const blob = new Blob([JSON.stringify(payload)], {
                    type: "text/plain;charset=utf-8"
                });
                return navigator.sendBeacon(LOG_ENDPOINT, blob);
            } catch (err) {
                console.warn("sendBeacon error:", err);
                return false;
            }
        }

        function logSessionStart() {
            enteredAt = nowIso();
            lastSeenAt = enteredAt;

            const payload = buildPayload("session_start", {
                last_seen_at: lastSeenAt,
                duration_sec: 0
            });

            postJson(payload);
        }

        function logHeartbeat() {
            if (hasEnded) return;

            lastSeenAt = nowIso();

            const payload = buildPayload("heartbeat", {
                last_seen_at: lastSeenAt,
                duration_sec: calcDurationSec(enteredAt, lastSeenAt)
            });

            postJson(payload);
        }

        function logSessionEnd(reason = "") {
            if (hasEnded) return;
            hasEnded = true;

            const leftAt = nowIso();
            const durationSec = calcDurationSec(enteredAt, leftAt);

            const payload = buildPayload("session_end", {
                left_at: leftAt,
                last_seen_at: lastSeenAt || leftAt,
                duration_sec: durationSec,
                note: reason
            });

            const sent = sendBeaconLog(payload);
            if (!sent) {
                postJson(payload);
            }

            stopHeartbeat();
        }

        function startHeartbeat() {
            stopHeartbeat();
            heartbeatTimer = setInterval(logHeartbeat, HEARTBEAT_INTERVAL_MS);
        }

        function stopHeartbeat() {
            if (heartbeatTimer) {
                clearInterval(heartbeatTimer);
                heartbeatTimer = null;
            }
        }

        function initVisitLogger() {
            sessionId = generateId("session");
            userId = getOrCreateUserId();
            enteredAt = null;
            lastSeenAt = null;
            hasEnded = false;
            logSessionStart();
            startHeartbeat();
        }

        function getCurrentData() {
            const buildingData = buildingTranslations[currentBuilding];
            if (!buildingData) return null;
            currentSpotId = buildingData.spotId || currentBuilding;
            return buildingData[currentLang] || buildingData.jp;
        }

        function applyCurrentContent(openPanel = false, autoPlay = false) {
            const data = getCurrentData();
            if (!data) return;

            document.getElementById("panel-title").innerText = data.title;
            document.getElementById("panel-text").innerText = data.text;

            if (openPanel) {
                document.getElementById("desc-panel").style.display = "block";
            }

            if (autoPlay) {
                playCurrentAudio();
            }
        }

        function playCurrentAudio() {
            const data = getCurrentData();
            if (!data || !data.audio) return;

            currentAudio.pause();
            currentAudio.currentTime = 0;
            currentAudio.src = "audio/" + data.audio;

            currentAudio.play().catch(err => {
                console.warn("音声再生エラー:", err);
            });
        }

        function updateContent(lang) {
            currentLang = lang;
            applyCurrentContent(true, true);
        }

        function setBuilding(buildingKey) {
            if (!buildingTranslations[buildingKey]) return;
            currentBuilding = buildingKey;

            updateGpsAnchorForCurrentBuilding();
            applyCurrentContent(true, true);
        }

        function toggleInfo() {
            const panel = document.getElementById("desc-panel");
            panel.style.display = (panel.style.display === "none" || panel.style.display === "") ? "block" : "none";
        }

        function takeSnapshot() {
            const scene = document.querySelector("a-scene");
            if (!scene || !scene.components.screenshot) {
                console.warn("スクリーンショット機能が使えません");
                return;
            }

            const canvas = scene.components.screenshot.getCanvas("perspective");
            const link = document.createElement("a");
            link.download = "bunkyonomori_AR.png";
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        function updateStatusLabel() {
            const box = document.getElementById("status-box");
            if (!box) return;
            box.innerText = currentDisplayMode === "gps" ? "GPS表示" : "自由表示";
        }

        function updateGpsAnchorForCurrentBuilding() {
            const gpsAnchor = document.getElementById("gps-anchor");
            const buildingData = buildingTranslations[currentBuilding];
            if (!gpsAnchor || !buildingData || !buildingData.gps) return;

            const lat = buildingData.gps.latitude;
            const lon = buildingData.gps.longitude;
            gpsAnchor.setAttribute("gps-entity-place", `latitude: ${lat}; longitude: ${lon};`);
        }

        function resetFreeModelTransform() {
            const freeModel = document.getElementById("free-model");
            const gpsModel = document.getElementById("gps-model");

            if (freeModel && gpsModel) {
                freeModel.object3D.position.copy(gpsModel.object3D.position);
                freeModel.object3D.rotation.copy(gpsModel.object3D.rotation);
                freeModel.object3D.scale.copy(gpsModel.object3D.scale);
            } else if (freeModel) {
                freeModel.object3D.position.set(0, 0, 0);
                freeModel.object3D.rotation.set(0, 0, 0);
                freeModel.object3D.scale.set(1, 1, 1);
            }
        }

        function placeFreeAnchorInFrontOfCamera() {
            const freeAnchor = document.getElementById("free-anchor");
            const cameraEl = document.getElementById("main-camera");
            if (!freeAnchor || !cameraEl) return;

            const worldPos = new THREE.Vector3();
            const worldDir = new THREE.Vector3();
            cameraEl.object3D.getWorldPosition(worldPos);
            cameraEl.object3D.getWorldDirection(worldDir);

            const spawnPos = worldPos.clone().add(worldDir.multiplyScalar(-3));
            freeAnchor.object3D.position.copy(spawnPos);
            freeAnchor.object3D.rotation.set(0, cameraEl.object3D.rotation.y, 0);
        }

        function setDisplayMode(mode) {
            const gpsAnchor = document.getElementById("gps-anchor");
            const freeAnchor = document.getElementById("free-anchor");

            if (!gpsAnchor || !freeAnchor) return;

            currentDisplayMode = mode;

            if (mode === "gps") {
                gpsAnchor.setAttribute("visible", true);
                freeAnchor.setAttribute("visible", false);
                updateStatusLabel();
                return;
            }

            if (mode === "free") {
                gpsAnchor.setAttribute("visible", false);
                freeAnchor.setAttribute("visible", true);
                placeFreeAnchorInFrontOfCamera();
                resetFreeModelTransform();
                updateStatusLabel();
            }
        }

        document.addEventListener("visibilitychange", () => {
            if (document.visibilityState === "hidden") {
                logSessionEnd("visibility_hidden");
            }
        });

        window.addEventListener("pagehide", () => {
            logSessionEnd("pagehide");
        });

        window.addEventListener("beforeunload", () => {
            logSessionEnd("beforeunload");
        });

        window.addEventListener("DOMContentLoaded", () => {
            initVisitLogger();
            updateGpsAnchorForCurrentBuilding();
            applyCurrentContent(false, false);
            setDisplayMode("gps");
        });
    </script>
</body>
</html>
