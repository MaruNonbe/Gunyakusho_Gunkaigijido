<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>文教の森 AR ログ解析版</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        .clickable { pointer-events: auto; }
        .menu { position: absolute; display: flex; flex-direction: column; gap: 4px; }
        button { padding: 10px; border-radius: 8px; border: none; background: white; font-weight: bold; font-size: 12px; }
        .top-left { top: 10px; left: 10px; }
        .ctrl-left { top: 35%; left: 10px; }
        .ctrl-right { top: 35%; right: 10px; }
        .bottom-bar { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 10px; }
        
        /* 強化版ログ表示パネル */
        #log-console { 
            position: absolute; top: 10px; right: 10px; width: 220px; height: 130px; 
            background: rgba(0,0,0,0.8); color: #0f0; font-family: monospace; font-size: 11px; padding: 8px; 
            overflow-y: auto; pointer-events: none; border: 1px solid #0f0;
        }
        .log-val { color: #ff0; font-weight: bold; }
    </style>
</head>

<body>
    <div id="ui-layer">
        <div id="log-console">
            [STATUS] <span id="status-msg">起動中...</span><br>
            [POS] X:<span id="val-px" class="log-val">0</span> Y:<span id="val-py" class="log-val">0</span> Z:<span id="val-pz" class="log-val">0</span><br>
            [SCALE] <span id="val-sc" class="log-val">1.00</span><br>
            --------------------<br>
            <div id="log-history"></div>
        </div>

        <div class="menu top-left clickable">
            <button onclick="switchModel('all')">全体</button>
            <button onclick="switchModel('kozakura')">小桜館</button>
            <button onclick="switchModel('assembly1')">初代</button>
            <button onclick="switchModel('assembly2')">二代目</button>
        </div>

        <div class="menu ctrl-left clickable">
            <button onclick="moveModel('z', -1)">前へ (-Z)</button>
            <button onclick="moveModel('z', 1)">後へ (+Z)</button>
            <button onclick="moveModel('x', -1)">左へ (-X)</button>
            <button onclick="moveModel('x', 1)">右へ (+X)</button>
            <button onclick="moveModel('y', 1)">上へ (+Y)</button>
            <button onclick="moveModel('y', -1)">下へ (-Y)</button>
        </div>

        <div class="menu ctrl-right clickable">
            <button onclick="rotateModel(30)">右回転</button>
            <button onclick="rotateModel(-30)">左回転</button>
            <button onclick="scaleModel(2)">倍増(x2)</button>
            <button onclick="scaleModel(0.5)">半分(x0.5)</button>
            <button onclick="resetPos()" style="background:#ff9800; color:white;">位置リセット</button>
        </div>

        <div class="bottom-bar clickable">
            <button onclick="location.reload()" style="background:#f44336; color:white;">アプリ再読込</button>
        </div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-entity id="ar-anchor" position="0 -1.6 -5" scale="1 1 1">
            <a-entity id="main-model" gltf-model="Buildings-v3.glb"></a-entity>
        </a-entity>
        <a-camera gps-camera rotation-reader></a-camera>
    </a-scene>

    <script>
        const appData = {
            all: "Buildings-v3.glb",
            kozakura: "Buildings-Gunyakusho.glb",
            assembly1: "Buildings-1st_Gunkai.glb",
            assembly2: "Buildings-2nd_Gunkai.glb"
        };

        const anchor = document.getElementById('ar-anchor');
        const model = document.getElementById('main-model');

        function updateLog(historyMsg = "") {
            const pos = anchor.getAttribute('position');
            const sc = anchor.getAttribute('scale');
            document.getElementById('val-px').innerText = pos.x.toFixed(1);
            document.getElementById('val-py').innerText = pos.y.toFixed(1);
            document.getElementById('val-pz').innerText = pos.z.toFixed(1);
            document.getElementById('val-sc').innerText = sc.x.toFixed(2);
            
            if(historyMsg) {
                const hist = document.getElementById('log-history');
                hist.innerHTML = "> " + historyMsg + "<br>" + hist.innerHTML;
            }
        }

        function switchModel(key) {
            model.setAttribute('gltf-model', appData[key]);
            document.getElementById('status-msg').innerText = "読込中: " + key;
            updateLog("モデル切替: " + key);
        }

        function moveModel(axis, val) {
            let p = anchor.getAttribute('position');
            p[axis] += val;
            anchor.setAttribute('position', p);
            updateLog("移動: " + axis + (val > 0 ? "+" : "") + val);
        }

        function rotateModel(deg) {
            let r = anchor.getAttribute('rotation');
            r.y += deg;
            anchor.setAttribute('rotation', r);
            updateLog("回転: " + r.y + "度");
        }

        function scaleModel(f) {
            let s = anchor.getAttribute('scale');
            s.x *= f; s.y *= f; s.z *= f;
            anchor.setAttribute('scale', s);
            updateLog("倍率変更: x" + f);
        }

        function resetPos() {
            anchor.setAttribute('position', '0 -1.6 -5');
            anchor.setAttribute('scale', '1 1 1');
            updateLog("位置・倍率を初期化");
        }

        model.addEventListener('model-loaded', () => {
            document.getElementById('status-msg').innerText = "読込成功！";
            document.getElementById('status-msg').style.color = "#0f0";
            updateLog("表示準備完了");
        });

        model.addEventListener('model-error', () => {
            document.getElementById('status-msg').innerText = "読込失敗(404等)";
            document.getElementById('status-msg').style.color = "#f00";
        });
    </script>
</body>
</html>
